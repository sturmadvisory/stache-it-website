<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent — Stache-it™</title>
    <link rel="icon" type="image/png" href="app-icon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #1c1c1e;
            color: #f5e6d3;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 24px;
        }
        .container { max-width: 480px; }
        .checkmark { font-size: 3em; margin-bottom: 20px; }
        h1 { font-size: 1.8em; margin-bottom: 12px; }
        p { color: #a89888; font-size: 1.1em; margin-bottom: 28px; }
        a {
            color: #a0522d;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05em;
            transition: color 0.2s;
        }
        a:hover { color: #c0724d; }
    </style>
</head>
<body>
    <div class="container">
        <div class="checkmark">&#10003;</div>
        <h1>Message sent!</h1>
        <p>Thanks for reaching out. We'll get back to you within 24 hours.</p>
        <a href="index.html">Back to Stache-it</a>
    </div>
</body>
</html>
